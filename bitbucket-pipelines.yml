# Neembly Gaming Platform, Copyright(C) 2019
# Pipeline build definitions
image: mcr.microsoft.com/dotnet/core/sdk:2.2
pipelines:
  custom:
    # manually run 
    sonar: 
      # This is for sonar at runtime checking
    - step:
        name: Runtime sonarqube testing
        caches:
          - dotnetcore
        script:
          - echo "On-demand Sonarqube checker running"
          - export PATH="$PATH:/root/.dotnet/tools"
          - apt-get update && apt-get install -y openjdk-8-jre
          - dotnet tool install --global dotnet-sonarscanner --version 4.4.2
          - chmod +x /root/.dotnet/tools/.store/dotnet-sonarscanner/4.4.2/dotnet-sonarscanner/4.4.2/tools/netcoreapp2.1/any/sonar-scanner-3.2.0.1227/bin/sonar-scanner
          - dotnet sonarscanner begin /k:$SONAR_PROJECT_KEY /d:sonar.host.url=$SONAR_HOST_URL /d:sonar.login=$SONAR_LOGIN_KEY
          - dotnet build
          - dotnet sonarscanner end /d:sonar.login=$SONAR_LOGIN_KEY
    runner-dev-ppauth:
    - variables:
      - name: ServerId
      - name: DeployDB
    - step:
        runs-on:
          - sandbox.runners
          - self.hosted
          - linux.shell    
        name: Deploy Dev-PPAuth
        deployment: test
        caches:
          - dotnetcore
        script:
          - echo $ServerId
          - if [ "$ServerId" = "1" ]; then export SSH_SERVER_DEVWS=$SSH_SERVER_DEVWS1 ; fi
          - if [ "$ServerId" = "2" ]; then export SSH_SERVER_DEVWS=$SSH_SERVER_DEVWS2 ; fi
          - echo $SSH_SERVER_DEVWS
          - if [ "$SSH_SERVER_DEVWS" = "" ]; then exit 1 ; fi
          - if [ "$ServerId" = "1" ]; then export ENV_DEV_TARGET="Development" ; fi
          - if [ "$ServerId" = "2" ]; then export ENV_DEV_TARGET="Development2" ; fi
          - echo $ENV_DEV_TARGET
          - if [ "$ENV_DEV_TARGET" = "" ]; then exit 1 ; fi
          - echo "Deploy to Dev-PPAuth"
          - export ASPNETCORE_ENVIRONMENT=$ENV_DEV_TARGET
          - dotnet restore
          - dotnet publish $PROJECT_NAME -p:RunAnalyzers=false --configuration Debug
          - echo "Stopping Service"
          - ssh $SSH_USER_DEVWS@$SSH_SERVER_DEVWS 'sudo systemctl stop neembly-pp-auth.service'
          - ssh $SSH_USER_DEVWS@$SSH_SERVER_DEVWS 'sudo systemctl stop neembly-bitcoingame-auth.service'
          - sleep 10s
          - echo "Uploading to Server"
          - scp -r $BITBUCKET_CLONE_DIR/$RUNNER_BUILD_DIR/bin/Debug/$DOTNET_FRAMEWORK/$GIT_PUBLISH_DIR/* $SSH_USER_DEVWS@$SSH_SERVER_DEVWS:$DEVWS_PUBDIR$FTP_ROOTDIR
          - scp -r $BITBUCKET_CLONE_DIR/$RUNNER_BUILD_DIR/*.json $SSH_USER_DEVWS@$SSH_SERVER_DEVWS:$DEVWS_PUBDIR$FTP_ROOTDIR
          - sleep 10s
          - echo "Restarting Service"
          - ssh $SSH_USER_DEVWS@$SSH_SERVER_DEVWS 'sudo systemctl start neembly-pp-auth.service'
          - ssh $SSH_USER_DEVWS@$SSH_SERVER_DEVWS 'sudo systemctl start neembly-bitcoingame-auth.service'
          - sleep 10s
          - if [ "$DeployDB" = "false" ]; then exit 0 ; fi
          - echo "Updating Database"
          - cd $BITBUCKET_CLONE_DIR/$RUNNER_DB_DIR
          - dotnet tool restore
          - dotnet dotnet-ef database update 
          - sleep 10s
    runner-sandbox-ppauth:
    - variables:
      - name: ServerId
      - name: DeployDB
      - name: Password 	
    - step:
        runs-on:
          - sandbox.runners
          - self.hosted
          - linux.shell    
        name: Deploy SB-PPAuth
        deployment: sandbox
        caches:
          - dotnetcore
        script:
          - echo $ServerId
          - if [ "$Password" != "$SBWS_VAR_PASSWORD" ]; then exit 1 ; fi
          - if [ "$ServerId" = "1" ]; then export SSH_SERVER_SBWS=$SSH_SERVER_SBWS1 ; fi
          - if [ "$ServerId" = "2" ]; then export SSH_SERVER_SBWS=$SSH_SERVER_SBWS2 ; fi
          - echo $SSH_SERVER_SBWS
          - if [ "$SSH_SERVER_SBWS" = "" ]; then exit 1 ; fi
          - if [ "$ServerId" = "1" ]; then export ENV_SB_TARGET="Sandbox" ; fi
          - if [ "$ServerId" = "2" ]; then export ENV_SB_TARGET="Sandbox2" ; fi
          - echo $ENV_SB_TARGET
          - if [ "$ENV_SB_TARGET" = "" ]; then exit 1 ; fi
          - echo "Deploy to SB-WS"
          - export ASPNETCORE_ENVIRONMENT=$ENV_SB_TARGET
          - dotnet restore
          - dotnet publish $PROJECT_NAME -p:RunAnalyzers=false --configuration Sandbox
          - echo "Stopping Service"
          - ssh $SSH_USER_SBWS@$SSH_SERVER_SBWS 'sudo systemctl stop neembly-pp-auth.service'
          - ssh $SSH_USER_SBWS@$SSH_SERVER_SBWS 'sudo systemctl stop neembly-bitcoingame-auth.service'
          - sleep 10
          - echo "Uploading to Server"
          - scp -r $BITBUCKET_CLONE_DIR/$RUNNER_BUILD_DIR/bin/Sandbox/$DOTNET_FRAMEWORK/$GIT_PUBLISH_DIR/* $SSH_USER_SBWS@$SSH_SERVER_SBWS:$SBWS_PUBDIR$FTP_ROOTDIR_WS
          - scp -r $BITBUCKET_CLONE_DIR/$RUNNER_BUILD_DIR/*.json $SSH_USER_SBWS@$SSH_SERVER_SBWS:$SBWS_PUBDIR$FTP_ROOTDIR_WS
          - scp -r $BITBUCKET_CLONE_DIR/$RUNNER_BUILD_DIR/appsettings.$ENV_SB_TARGET.json $SSH_USER_SBWS@$SSH_SERVER_SBWS:$SBWS_PUBDIR$FTP_ROOTDIR_WS/appsettings.Sandbox.json
          - if [ "$ServerId" = "2" ]; then scp -r $BITBUCKET_CLONE_DIR/$RUNNER_DB_DIR/connection.$ENV_SB_TARGET.json $BITBUCKET_CLONE_DIR/$RUNNER_DB_DIR/connection.Sandbox.json ; fi
          - sleep 10s
          - echo "Restarting Service"
          - ssh $SSH_USER_SBWS@$SSH_SERVER_SBWS 'sudo systemctl start neembly-pp-auth.service'
          - ssh $SSH_USER_SBWS@$SSH_SERVER_SBWS 'sudo systemctl start neembly-bitcoingame-auth.service'
          - sleep 10
          - if [ "$DeployDB" = "false" ]; then exit 0 ; fi
          - echo "Updating Database"
          - cd $BITBUCKET_CLONE_DIR/$RUNNER_DB_DIR
          - dotnet tool restore
          - dotnet dotnet-ef database update 
          - sleep 10s
    runner-alpha-prod-ppauth:
    - variables:
      - name: ServerId
      - name: Password 		  
      - name: VersionNo
    - step:
        runs-on:
          - prod.runners
          - self.hosted
          - linux.shell    
        name: Deploy ProdAlpha
        deployment: production
        caches:
          - dotnetcore
        script:
          - echo $ServerId
          - if [ "$Password" != "$PROD_VAR_PASSWORD" ]; then exit 1 ; fi
          - if [ "$ServerId" = "1" ]; then export SSH_SERVER_PUBWS=$SSH_SERVER_PUBWS1 ; fi
          - if [ "$ServerId" = "2" ]; then export SSH_SERVER_PUBWS=$SSH_SERVER_PUBWS2 ; fi
          - echo $SSH_SERVER_PUBWS
          - if [ "$SSH_SERVER_PUBWS" == "" ]; then exit 1 ; fi
          - if [ "$VersionNo" = "" ]; then export VERSION_NUMBER=$BUILD_VERSION ; else export VERSION_NUMBER=$VersionNo ; fi
          - echo $VERSION_NUMBER
          - echo "Manual deploy to PROD-release environment (ClusterAlpha)"
          - export ASPNETCORE_ENVIRONMENT="Release"
          - export ASPNETCORE_CLUSTER="ClusterAlpha"
          - dotnet restore
          - dotnet publish $PROJECT_NAME -p:RunAnalyzers=false --configuration Release /p:AssemblyVersion=$VERSION_NUMBER 
          - echo "Stopping Service"
          - ssh $SSH_USER_PUBWS@$SSH_SERVER_PUBWS 'sudo systemctl stop neembly-pp-auth.service'
          - ssh $SSH_USER_PUBWS@$SSH_SERVER_PUBWS 'sudo systemctl stop neembly-bitcoingame-auth.service'
          - sleep 10s
          - echo "Uploading Server"
          - apt-get update && apt-get -y -qq install openssh-client curl
          - scp -r $DOTNET_BUILD_DIR/bin/Release/$DOTNET_FRAMEWORK/$GIT_PUBLISH_DIR/* $SSH_USER_PUBWS@$SSH_SERVER_PUBWS:$PUBWS_PUBDIR$FTP_ROOTDIR_WS
          - scp -r $DOTNET_BUILD_DIR/*.json $SSH_USER_PUBWS@$SSH_SERVER_PUBWS:$PUBWS_PUBDIR$FTP_ROOTDIR_WS
          - sleep 10s
          - echo "Restarting Service"
          - ssh $SSH_USER_PUBWS@$SSH_SERVER_PUBWS 'sudo systemctl start neembly-pp-auth.service'
          - ssh $SSH_USER_PUBWS@$SSH_SERVER_PUBWS 'sudo systemctl start neembly-bitcoingame-auth.service'
          - sleep 10s
          - cd $BITBUCKET_CLONE_DIR/$RUNNER_DB_DIR
          - dotnet ef database update
          - sleep 10s
    runner-alpha-prod-database:
    - variables:
      - name: ServerId
      - name: Password 		  
      - name: VersionNo
    - step:
        runs-on:
          - prod.runners
          - self.hosted
          - linux.shell    
        name: Deploy DB ProdAlpha
        deployment: production
        caches:
          - dotnetcore
        script:
          - echo "Manual deploy to PROD-release environment (ClusterAlpha)"
          - if [ "$Password" != "$PROD_VAR_PASSWORD" ]; then exit 1 ; fi
          - export ASPNETCORE_ENVIRONMENT="Release"
          - export ASPNETCORE_CLUSTER="ClusterAlpha"
          - dotnet restore
          - dotnet build $PROJECT_NAME -p:RunAnalyzers=false --configuration Release /p:AssemblyVersion=$BUILD_VERSION 
          - echo "Updating Database"
          - cd $BITBUCKET_CLONE_DIR/$RUNNER_DB_DIR
          - dotnet tool restore
          - dotnet dotnet-ef database update 
          - sleep 10s
  default:
    # task per ticket item build
    - step:
        runs-on:
          - sandbox.runners
          - self.hosted
          - linux.shell    
        script:
          - echo "Hosted Runner compilation..."
          - echo "Branch building..."
          - dotnet restore
          - dotnet build $PROJECT_NAME -p:RunAnalyzers=false --configuration Debug
  branches:
    master:
    # master push-merge build 
    - step:
        runs-on:
          - sandbox.runners
          - self.hosted
          - linux.shell    
        name: Deploy to test
        caches:
          - dotnetcore
        script:
          - echo "Development deploy"
          - export ASPNETCORE_ENVIRONMENT="Development"
          - dotnet restore
          - dotnet build $PROJECT_NAME -p:RunAnalyzers=false --configuration Debug
          - echo "Select pipeline deploy-to-dev to promote DEV environment manually"
    sandbox:
    # sandbox push-merge build 
    - step:
        runs-on:
          - sandbox.runners
          - self.hosted
          - linux.shell    
        name: Deploy to sandbox
        caches:
          - dotnetcore
        script:
          - echo "Auto Deployment CI/CD to UAT-sandbox environment"
          - export ASPNETCORE_ENVIRONMENT="Sandbox"
          - dotnet restore
          - dotnet build $PROJECT_NAME -p:RunAnalyzers=false --configuration Sandbox 
          - echo "Select pipeline deploy-sb to promote Sandbox environment manually"
    preprod:
    # pre production push-merge build 
    - step:
        runs-on:
          - sandbox.runners
          - self.hosted
          - linux.shell    
        name: Deploy to pre-production
        caches:
          - dotnetcore
        script:
          - echo "Auto Deployment CI/CD to PROD-release environment"
          - export ASPNETCORE_ENVIRONMENT="Release"
          - dotnet restore
          - dotnet build $PROJECT_NAME -p:RunAnalyzers=false --configuration Release
          - echo "Select pipeline deploy-release to promote Preprod/Release environment manually"		  		  
    release:
    # production push-merge build 
    - step:
        runs-on:
          - sandbox.runners
          - self.hosted
          - linux.shell    
        name: Deploy to production
        caches:
          - dotnetcore
        script:
          - echo "Auto Deployment CI/CD to PROD-release environment"
          - export ASPNETCORE_ENVIRONMENT="Release"
          - export ASPNETCORE_CLUSTER="Sandbox"
          - dotnet restore
          - dotnet build $PROJECT_NAME -p:RunAnalyzers=false --configuration Release 
          - echo "Select pipeline deploy-release to promote Preprod/Release environment manually"